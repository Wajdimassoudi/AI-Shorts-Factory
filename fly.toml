# fly.toml app configuration file generated for ai-shorts-factory on 2026-05-23T17:23:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-shorts-factory'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
